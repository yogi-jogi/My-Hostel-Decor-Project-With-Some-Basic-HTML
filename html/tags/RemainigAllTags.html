<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRE BIG SMALL</title>
</head>
<body>

    <!--    PRE TAG   -->
        <p>first line
        more        space</p>
    <pre>
        first line
        more        space

     <!-- character entity refrence -->
       &lambda;
        &CloseCurlyDoubleQuote;    
    </pre>
    <hr>
    <!--   BIG   -->
       <big>this is big</big>
    
    <br>
    <!--   small -->   
       <small>this is small </small>    

    <hr>
    <!-- super script(power)-->
    <p> 
        (a+b)2 = a2 + 2ab + b2 <br>
        (a+b)<sup>2</sup> = a<sup>2</sup> +2ab + b<sup>2</sup>
    </p>

    <hr>
    <!-- sub script (bottom)-->
    <p>
        CH4 + O2 = O2 + CO2 <br>
        CH<sub>4</sub> + O<sub>2</sub> = O<sub>2</sub> + CO<sub>2</sub>

    </p>


    
</body>
</html>
