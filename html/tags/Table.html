<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table</title>
</head>
<body>
    <table border="1"> <!--   border means table border -->

        <caption>Student technologies</caption><!--  caption means table kis cheej ke bare me hai uski heading aur ye center of table me hi aati hai   -->
        <tr>
            <th colspan="2">Tech I am good at </th>  <!-- column merge means  colspan ka use tab kiya jata hai jab hume multiple column chahiye ek data dalne ke liye -->
        </tr>
        <tr> <!--    table row   -->
            <th>Language</th><!--   table header   -->
            <th>Competency</th>
            <th>Years</th>
        </tr>
        <tr>
            <td>C</td>  <!--   table data -->
            <td>5/10</td>
            <td>5 years</td>
        </tr>
        <tr>
            <td>java</td>
            <td>2/10</td>
            <td>10 years</td>
        </tr>
    </table>
</body>
</html>
