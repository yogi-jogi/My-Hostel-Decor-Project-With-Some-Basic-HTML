<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>bold/italic/underscore/strikeline</title>
</head>
<body>
    <!--   bold  -->
    <b>youtube</b><br>
    <!--   italic  -->
    <i>google</i><br>
    <!--   underscore   -->
    <u>instagram</u><br>
    <!--  strikeline  -->
    <s>limestone</s>
</body>
</html>
